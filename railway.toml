# Railway Deployment Configuration
# https://railway.app

[build]
  builder = "NIXPACKS"
  buildCommand = "cd backend && mvn clean package -DskipTests"

[deploy]
  startCommand = "cd backend && java -jar target/covid19-tracker-1.0.0.jar"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[env]
  JAVA_VERSION = "17"
  MAVEN_VERSION = "3.8"

