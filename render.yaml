services:
  - type: web
    name: covid19-tracker-backend
    env: java
    region: oregon
    plan: free
    buildCommand: cd backend && mvn clean install -DskipTests
    startCommand: java -jar backend/target/covid19-tracker-1.0.0.jar
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SERVER_PORT
        value: 8080
    healthCheckPath: /actuator/health
    autoDeploy: true

