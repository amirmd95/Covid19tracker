version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: covid19-postgres
    environment:
      POSTGRES_DB: covid19_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - covid19-network

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: covid19-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/covid19_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - covid19-network
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: covid19-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - covid19-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  covid19-network:
    driver: bridge

