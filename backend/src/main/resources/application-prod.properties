# Application Configuration - PostgreSQL Production Profile
spring.application.name=covid19-tracker-backend
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/covid19_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
cors.allowed.origins=http://localhost:4200,http://localhost:80

# COVID API Configuration
covid.api.base-url=https://disease.sh/v3/covid-19

# Cache Configuration
spring.cache.cache-names=covidData,globalStats,allCountries
spring.cache.caffeine.spec=expireAfterWrite=1h

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.com.covid19=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

