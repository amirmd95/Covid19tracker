# Application Configuration
spring.application.name=covid19-tracker-backend
server.port=8080

# Database Configuration (PostgreSQL)
# Uncomment for PostgreSQL
#spring.datasource.url=jdbc:postgresql://localhost:5432/covid19_db
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Database Configuration (For Development)
spring.datasource.url=jdbc:h2:mem:covid19_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For PostgreSQL use: org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
# For deployment: Update this with your actual frontend URL after deployment
# Example: https://covid19-tracker.vercel.app,http://localhost:4200
cors.allowed.origins=*

# COVID API Configuration
covid.api.base-url=https://disease.sh/v3/covid-19

# Cache Configuration
spring.cache.cache-names=covidData
spring.cache.caffeine.spec=expireAfterWrite=1h

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.com.covid19=DEBUG
logging.level.org.springframework.web=INFO

